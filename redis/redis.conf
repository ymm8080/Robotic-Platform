# Redis 配置 v3.4 - AOF OOM 防护 + 生产级加固
# 绑定地址：仅内网（禁止公网直连）
bind 0.0.0.0
protected-mode yes
port 6379

# 内存上限：8GB（硬限制，触发 OOM 时由 Watchdog 处理，75%告警）
maxmemory 8gb
# 优先淘汰最近最少使用的键
maxmemory-policy allkeys-lru

# AOF 持久化（防数据丢失，但控制文件大小）
appendonly yes
appendfilename "appendonly.aof"
# 每秒 fsync，平衡性能与安全
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 50
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
# RDB + AOF 混合，加速恢复
aof-use-rdb-preamble yes

# RDB 快照（备用）
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# 连接限制（防连接炸弹）
maxclients 100
timeout 300
tcp-keepalive 300

# 日志
loglevel notice
logfile /data/redis.log

# 慢查询日志（用于性能分析）
# 10ms
slowlog-log-slower-than 10000
slowlog-max-len 128

# 安全
disable-thp yes

# 密码认证（必须设置，否则 protected-mode 会阻止跨容器连接）
# 生产环境：通过 docker-compose 命令参数覆盖，勿在此处硬编码
#   docker-compose run redis redis-server --requirepass <strong-password>
requirepass robot-platform-redis

# 重命名危险命令（防误操作/注入）
rename-command FLUSHALL ""
rename-command FLUSHDB ""
rename-command CONFIG ""
rename-command SHUTDOWN ""
rename-command DEBUG ""
# KEYS kept enabled — used by sap-bridge inventory service
# Future: migrate to SCAN and rename KEYS

# 键空间通知（供 Node-RED 监听过期事件进行会话清理）
notify-keyspace-events KEA

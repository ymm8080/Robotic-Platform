# Redis 配置 v3.4 - AOF OOM 防护 + 生产级加固
# 绑定地址：仅内网（禁止公网直连）
bind 0.0.0.0
protected-mode yes
port 6379

# 内存上限：256MB（硬限制，触发 OOM 时由 Watchdog 处理）
maxmemory 256mb
maxmemory-policy allkeys-lru  # 优先淘汰最近最少使用的键

# AOF 持久化（防数据丢失，但控制文件大小）
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec  # 每秒 fsync，平衡性能与安全
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 50
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes  # RDB + AOF 混合，加速恢复

# RDB 快照（备用）
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# 连接限制（防连接炸弹）
maxclients 100
timeout 300
tcp-keepalive 300

# 日志
loglevel notice
logfile /data/redis.log

# 慢查询日志（用于性能分析）
slowlog-log-slower-than 10000  # 10ms
slowlog-max-len 128

# 安全
disable-thp yes

# =============================================================================
# PR Review Gate — blocks merge until AI code review completes successfully
# On every PR open/sync: immediately requests changes to gray out merge button.
# The AI review workflow (deepseek-pr-review.yml) auto-approves when clean.
# =============================================================================
name: PR Review Gate

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  pull-requests: write

jobs:
  block-merge:
    name: Block merge until reviewed
    runs-on: ubuntu-latest
    steps:
      - name: Request changes to block merge
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh pr review "$PR" --request-changes --body \
            "## 🔒 Merge Blocked — AI Code Review Required

          This PR has been **automatically blocked** from merging.

          ### What happens next:
          1. The **DeepSeek AI Review** workflow is running…
          2. If the review passes cleanly → the block is **auto-dismissed** and the merge button becomes available
          3. If issues are found → the block remains with details in the [AI review comment](${{ github.server_url }}/${{ github.repository }}/pull/$PR#issuecomment-new)

          ### Manual override
          A maintainer with write access can dismiss this review and approve manually if needed.

          ---
          🤖 *Automated gate — do not merge without code review*"

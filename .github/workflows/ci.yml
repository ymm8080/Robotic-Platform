# =============================================================================
# SAP-EWM 机器人调度平台 CI/CD 流水线 v3.4
# 触发：push/PR 全分支 + 每日定时扫描
# 阶段：lint → adr → test → build → trivy scan → docker build (no push)
# =============================================================================
name: CI

on:
  push:
    branches: ['**']
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"
  pull_request:
    branches: ['**']
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"
  schedule:
    - cron: "0 6 * * 1"  # Weekly Mon 06:00 UTC — dependency & security scan

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  RUNTIME_VERSION: "v3.4"

jobs:
  # ===========================================================================
  # Phase 1: Code Quality & Lint
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint (sap-bridge)
        run: |
          cd sap-bridge
          ruff check . --config ruff.toml

      - name: Ruff lint (scripts)
        run: |
          ruff check scripts/ --ignore E501

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: TypeScript type check (dashboard)
        run: |
          cd dashboard
          npm ci
          npx tsc --noEmit || echo "TS checks pending — non-blocking"

  # ===========================================================================
  # Phase 2: ADR Validation
  # ===========================================================================
  adr-validate:
    name: ADR Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate ADR format
        run: |
          errors=0
          for f in 10_adr/ADR-*.md; do
            [ -f "$f" ] || continue
            if ! grep -q "^# ADR-" "$f"; then
              echo "::error file=$f::Missing '# ADR-NNN' title"
              errors=$((errors+1))
            fi
            if ! grep -q "^\*\*Status\*\*:" "$f"; then
              echo "::error file=$f::Missing '**Status:**' line"
              errors=$((errors+1))
            fi
            if ! grep -q "^\*\*Date\*\*:" "$f"; then
              echo "::error file=$f::Missing '**Date:**' line"
              errors=$((errors+1))
            fi
          done
          if [ $errors -gt 0 ]; then exit 1; fi
          echo "✅ All ADRs valid"

  # ===========================================================================
  # Phase 3: Test
  # ===========================================================================
  test:
    name: Test
    needs: [lint, adr-validate]
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # requirements-base.txt excludes pyrfc, which needs the SAP NW RFC SDK
          # (not available in CI). The Dockerfile does the same via INCLUDE_RFC=false.
          pip install -r sap-bridge/requirements-base.txt

      - name: Run pytest with coverage
        run: |
          cd sap-bridge
          python -m pytest tests/ \
            --asyncio-mode=auto \
            --cov=. --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml:../coverage.xml \
            -v
        env:
          REDIS_URL: redis://localhost:6379/15
          DB_PATH: /tmp/test_robot_platform.db

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: sap-bridge
          fail_ci_if_error: false

      - name: Check coverage threshold (80%)
        run: python .github/scripts/check_coverage.py coverage.xml 0.80

  # ===========================================================================
  # Phase 4: Build
  # ===========================================================================
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard (Vite + TypeScript)
        run: |
          cd dashboard
          npm ci
          npm run build

      - name: Verify Docker Compose config
        run: |
          docker compose config 2>&1 | head -5
          echo "✅ Docker Compose config valid"

      - name: Syntax check all Python files
        run: python .github/scripts/syntax_check.py

      - name: Build sap-bridge Docker image (no push)
        run: |
          docker build -t sap-bridge:ci \
            --build-arg RUNTIME_VERSION=${{ env.RUNTIME_VERSION }} \
            --build-arg INCLUDE_RFC=false \
            ./sap-bridge

      - name: Build watchdog Docker image (no push)
        run: |
          docker build -t watchdog:ci ./watchdog

  # ===========================================================================
  # Phase 5: Trivy Security Scan (master only)
  # ===========================================================================
  trivy-scan:
    name: Trivy
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy on sap-bridge source
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./sap-bridge
          format: sarif
          output: trivy-sap-bridge.sarif
          severity: HIGH,CRITICAL

      - name: Run Trivy on watchdog source
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./watchdog
          format: sarif
          output: trivy-watchdog.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-sap-bridge.sarif
          category: sap-bridge

      - name: Check for criticals
        run: |
          if grep -q '"severity": "CRITICAL"' trivy-sap-bridge.sarif 2>/dev/null; then
            echo "⚠️  CRITICAL vulnerabilities found — review at Security tab"
          else
            echo "✅ No CRITICAL vulnerabilities"
          fi

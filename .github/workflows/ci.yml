# =============================================================================
# SAP-EWM 机器人调度平台 CI/CD 流水线 v3.4
# 触发：push/PR 到 master + 每日定时扫描
# 阶段：lint → test → build → docker (仅 master)
# =============================================================================
name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".claude/**"
  schedule:
    - cron: "0 6 * * 1"  # 每周一早6点 UTC 依赖安全扫描

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ===========================================================================
  # Phase 1: Code Quality & Lint
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python lint tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip list | grep ruff

      - name: Ruff lint (sap-bridge)
        run: |
          cd sap-bridge
          ruff check . --output-format github || true  # non-blocking initially

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: TypeScript type check (dashboard)
        run: |
          cd dashboard
          npm ci
          npx tsc --noEmit || true  # non-blocking initially

  # ===========================================================================
  # Phase 2: Test
  # ===========================================================================
  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r sap-bridge/requirements.txt

      - name: Run pytest with coverage
        run: |
          cd sap-bridge
          python -m pytest tests/ \
            --asyncio-mode=auto \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:../coverage.xml \
            -v
        env:
          REDIS_URL: redis://localhost:6379/15
          DB_PATH: /tmp/test_robot_platform.db

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: sap-bridge
          fail_ci_if_error: false

  # ===========================================================================
  # Phase 3: Build
  # ===========================================================================
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Build dashboard (Vite + TypeScript)
        run: |
          cd dashboard
          npm ci
          npm run build

      - name: Verify Docker Compose config
        run: |
          docker compose config 2>&1 | head -5
          echo "Docker Compose config valid ✓"

  # ===========================================================================
  # Phase 4: Docker Build & Push (master only)
  # ===========================================================================
  docker:
    name: Docker
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build watchdog image
        uses: docker/build-push-action@v5
        with:
          context: ./watchdog
          push: false
          tags: robot-platform-watchdog:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: false
          tags: robot-platform-dashboard:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

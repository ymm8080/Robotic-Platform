name: DeepSeek AI Review

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DeepSeek AI Review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -x  # Debug output

          # Determine what to diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            HEAD="origin/${{ github.head_ref }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD~1"
            fi
          fi

          echo "Diffing $BASE..$HEAD"
          git diff "$BASE".."$HEAD" > /tmp/pr_diff.txt 2>&1 || git diff HEAD~1 HEAD > /tmp/pr_diff.txt 2>&1

          if [ ! -s /tmp/pr_diff.txt ]; then
            echo "No diff found, skipping"
            exit 0
          fi

          LINE_COUNT=$(wc -l < /tmp/pr_diff.txt)
          if [ "$LINE_COUNT" -gt 8000 ]; then
            head -8000 /tmp/pr_diff.txt > /tmp/pr_diff_trunc.txt
            mv /tmp/pr_diff_trunc.txt /tmp/pr_diff.txt
          fi

          echo "Diff size: $LINE_COUNT lines"

          cp /tmp/pr_diff.txt pr_diff.txt
          python3 .github/scripts/deepseek-review.py 2>&1

      - name: Post review comment
        if: success() && hashFiles('review_output.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REVIEW=$(cat review_output.md)
          { echo "## 🤖 AI Code Review"; echo ""; echo "$REVIEW"; echo ""; echo "---"; echo "*Powered by DeepSeek API*"; } > /tmp/comment_body.md
          COMMENT=$(cat /tmp/comment_body.md)

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body "$COMMENT"
          else
            gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
              --field body="$COMMENT"
          fi
          echo "Review posted successfully"

name: DeepSeek AI Review

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DeepSeek AI Review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Determine what to diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            HEAD="origin/${{ github.head_ref }}"
          else
            BASE="origin/${{ github.event.before }}"
            HEAD="origin/${{ github.event.after }}"
            # Fallback: diff against previous commit
            if [ -z "$BASE" ] || [ "$BASE" = "origin/" ]; then
              BASE="HEAD~1"
            fi
            if [ -z "$HEAD" ] || [ "$HEAD" = "origin/" ]; then
              HEAD="HEAD"
            fi
          fi

          echo "Diffing $BASE..$HEAD"
          DIFF=$(git diff "$BASE".."$HEAD" 2>/dev/null || git diff HEAD~1 HEAD)

          # Truncate to ~8000 lines
          LINE_COUNT=$(echo "$DIFF" | wc -l)
          if [ "$LINE_COUNT" -gt 8000 ]; then
            DIFF=$(echo "$DIFF" | head -8000)
            DIFF="$DIFF\n... (truncated)"
          fi

          if [ -z "$DIFF" ]; then
            echo "No diff found, skipping review"
            echo "review_body=No changes to review." >> $GITHUB_OUTPUT
            exit 0
          fi

          # Call DeepSeek API
          python3 -c "
import json, urllib.request, os

payload = json.dumps({
    'model': 'deepseek-chat',
    'messages': [
        {
            'role': 'system',
            'content': 'You are an expert code reviewer. Analyze the PR diff and provide a concise, actionable review in Chinese. Focus on: 1) bugs and logic errors 2) security issues 3) performance concerns 4) code style best practices. Be specific - reference line numbers and suggest fixes. If the code looks good, say so briefly.'
        },
        {
            'role': 'user',
            'content': f'Review this diff:\n\n{json.dumps(os.environ[\"DIFF\"])}'
        }
    ],
    'max_tokens': 4096,
    'temperature': 0.3
}).encode('utf-8')

req = urllib.request.Request(
    'https://api.deepseek.com/chat/completions',
    data=payload,
    headers={
        'Content-Type': 'application/json',
        'Authorization': f'Bearer {os.environ[\"DEEPSEEK_API_KEY\"]}'
    }
)
resp = json.loads(urllib.request.urlopen(req, timeout=60).read().decode('utf-8'))
review = resp['choices'][0]['message']['content']
with open('review_output.md', 'w') as f:
    f.write(review)
print('Review generated')
" 2>&1 || echo "API call failed — check DEEPSEEK_API_KEY secret"

          if [ -f review_output.md ]; then
            REVIEW=$(cat review_output.md)
            COMMENT="## 🤖 DeepSeek AI Review\n\n${REVIEW}\n\n---\n*Powered by DeepSeek API*"
            echo "review_body<<EOF" >> $GITHUB_OUTPUT
            echo "$COMMENT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Post review
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f review_output.md ]; then
            echo "No review generated, skipping"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body "$(cat review_output.md)"
            echo "Posted as PR comment #${{ github.event.pull_request.number }}"
          else
            gh commit comment "${{ github.sha }}" --body "$(cat review_output.md)"
            echo "Posted as commit comment on ${{ github.sha }}"
          fi

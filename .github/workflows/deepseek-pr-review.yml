name: DeepSeek AI Review

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DeepSeek AI Review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          # Determine what to diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            HEAD="origin/${{ github.head_ref }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi

          DIFF=$(git diff "$BASE".."$HEAD" 2>/dev/null || git diff HEAD~1 HEAD)

          LINE_COUNT=$(echo "$DIFF" | wc -l)
          if [ "$LINE_COUNT" -gt 8000 ]; then
            DIFF=$(echo "$DIFF" | head -8000)
            DIFF="$DIFF\n... (truncated)"
          fi

          if [ -z "$DIFF" ]; then
            echo "No diff, skipping"
            exit 0
          fi

          echo "$DIFF" > /tmp/pr_diff.txt

          python3 << 'PYEOF'
import json, urllib.request, os

with open('/tmp/pr_diff.txt') as f:
    diff = f.read()

payload = json.dumps({
    "model": "deepseek-chat",
    "messages": [
        {
            "role": "system",
            "content": "You are an expert code reviewer. Analyze the diff and provide concise, actionable review in Chinese. Focus on: 1) bugs 2) security 3) performance 4) style. Be specific with line numbers. If code looks good, say so briefly."
        },
        {
            "role": "user",
            "content": f"Review this diff:\n\n{diff}"
        }
    ],
    "max_tokens": 4096,
    "temperature": 0.3
}).encode("utf-8")

req = urllib.request.Request(
    "https://api.deepseek.com/chat/completions",
    data=payload,
    headers={
        "Content-Type": "application/json",
        "Authorization": f"Bearer {os.environ['DEEPSEEK_API_KEY']}"
    }
)
try:
    resp = json.loads(urllib.request.urlopen(req, timeout=60).read().decode("utf-8"))
    review = resp["choices"][0]["message"]["content"]
    with open("review_output.md", "w") as f:
        f.write(review)
    print("Review generated successfully")
except Exception as e:
    print(f"API call failed: {e}")
    print("Check DEEPSEEK_API_KEY secret is set in GitHub repo settings")
PYEOF

      - name: Post review comment
        if: success() && hashFiles('review_output.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REVIEW=$(cat review_output.md)
          COMMENT="## 🤖 DeepSeek AI Review

${REVIEW}

---
*Powered by DeepSeek API | [Config](/.github/workflows/deepseek-pr-review.yml)*"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body "$COMMENT"
            echo "Posted as PR comment #${{ github.event.pull_request.number }}"
          else
            gh commit comment "${{ github.sha }}" --body "$COMMENT"
            echo "Posted as commit comment on ${{ github.sha }}"
          fi

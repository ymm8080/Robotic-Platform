name: DeepSeek AI Review

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DeepSeek AI Review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -x  # Debug output

          # Determine what to diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            HEAD="origin/${{ github.head_ref }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD~1"
            fi
          fi

          echo "Diffing $BASE..$HEAD"
          git diff "$BASE".."$HEAD" > /tmp/pr_diff.txt 2>&1 || git diff HEAD~1 HEAD > /tmp/pr_diff.txt 2>&1

          if [ ! -s /tmp/pr_diff.txt ]; then
            echo "No diff found, skipping"
            exit 0
          fi

          LINE_COUNT=$(wc -l < /tmp/pr_diff.txt)
          if [ "$LINE_COUNT" -gt 8000 ]; then
            head -8000 /tmp/pr_diff.txt > /tmp/pr_diff_trunc.txt
            mv /tmp/pr_diff_trunc.txt /tmp/pr_diff.txt
          fi

          echo "Diff size: $LINE_COUNT lines"

          cp /tmp/pr_diff.txt pr_diff.txt
          python3 .github/scripts/deepseek-review.py 2>&1

      - name: Post review comment
        if: success() && hashFiles('review_output.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            printf '## 🤖 AI Code Review\n\n'
            cat review_output.md
            printf '\n---\n*Powered by DeepSeek API*\n'
          } > /tmp/comment_body.md

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment_body.md
            echo "Review posted as PR comment (pull_request event)"
          else
            # On push events, find the associated PR and post there
            BRANCH="${{ github.ref_name }}"
            PR_NUM=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [ -n "$PR_NUM" ]; then
              gh pr comment "$PR_NUM" --body-file /tmp/comment_body.md
              echo "Review posted as PR comment on PR #$PR_NUM (push event)"
            else
              echo "Push event — no open PR found for branch $BRANCH, skipping comment."
            fi
          fi

      - name: Unblock merge if review is clean
        if: steps.review.outcome == 'success' && github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if grep -q "AUTOFIX:CLEAN" review_output.md; then
            echo "AI review is clean - dismissing any stale CHANGES_REQUESTED reviews"
            REVIEWS=$(gh api repos/${{ github.repository }}/pulls/$PR/reviews --jq '.[] | select(.state == "CHANGES_REQUESTED") | .id')
            for RID in $REVIEWS; do
              echo "Dismissing review $RID"
              gh api --method PUT repos/${{ github.repository }}/pulls/$PR/reviews/$RID/dismissals -f message="AI review is CLEAN - auto-dismissing block" || true
            done
            echo "All blocking reviews dismissed - merge is now allowed"
          else
            echo "AI review found issues - keeping merge blocked"
            gh pr review "$PR" --request-changes --body "AI Code Review Found Issues - see PR comments for details" || true
          fi

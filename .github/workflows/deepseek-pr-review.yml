name: DeepSeek AI Review

on:
  push:
    branches: [master]
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DeepSeek AI Review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -x  # Debug output

          # Determine what to diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            HEAD="origin/${{ github.head_ref }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD~1"
            fi
          fi

          git diff "$BASE".."$HEAD" > /tmp/pr_diff.txt 2>&1 || git diff HEAD~1 HEAD > /tmp/pr_diff.txt 2>&1

          if [ ! -s /tmp/pr_diff.txt ]; then
            echo "No diff found, skipping"
            exit 0
          fi

          LINE_COUNT=$(wc -l < /tmp/pr_diff.txt)
          if [ "$LINE_COUNT" -gt 8000 ]; then
            head -8000 /tmp/pr_diff.txt > /tmp/pr_diff_trunc.txt
            mv /tmp/pr_diff_trunc.txt /tmp/pr_diff.txt
          fi

          echo "Diff size: $LINE_COUNT lines"

          python3 << 'PYEOF'
import json, urllib.request, os, sys

with open('/tmp/pr_diff.txt') as f:
    diff = f.read()

api_key = os.environ.get('DEEPSEEK_API_KEY', '')
if not api_key:
    print("ERROR: DEEPSEEK_API_KEY not set")
    sys.exit(1)

payload = json.dumps({
    "model": "deepseek-chat",
    "messages": [
        {
            "role": "system",
            "content": "You are an expert code reviewer. Analyze the diff and provide concise, actionable review in Chinese. Focus on: 1) bugs 2) security 3) performance 4) style. Be specific with line numbers."
        },
        {
            "role": "user",
            "content": "Review this diff:\n\n" + diff
        }
    ],
    "max_tokens": 4096,
    "temperature": 0.3
}).encode("utf-8")

req = urllib.request.Request(
    "https://api.deepseek.com/chat/completions",
    data=payload,
    headers={
        "Content-Type": "application/json",
        "Authorization": f"Bearer {api_key}"
    }
)
try:
    resp = urllib.request.urlopen(req, timeout=120)
    result = json.loads(resp.read().decode("utf-8"))
    review = result["choices"][0]["message"]["content"]
    with open("review_output.md", "w") as f:
        f.write(review)
    print("Review generated successfully")
except urllib.error.HTTPError as e:
    print(f"HTTP Error: {e.code} {e.reason}")
    body = e.read().decode("utf-8")
    print(f"Response: {body[:500]}")
    sys.exit(1)
except Exception as e:
    print(f"Error: {e}")
    sys.exit(1)
PYEOF

      - name: Post review comment
        if: success() && hashFiles('review_output.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REVIEW=$(cat review_output.md)
          COMMENT="## AI Code Review

${REVIEW}

---
*Powered by DeepSeek API*"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body "$COMMENT"
          else
            gh api "/repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
              --field body="$COMMENT"
          fi
          echo "Review posted successfully"

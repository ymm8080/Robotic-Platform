name: DeepSeek AI Review

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DeepSeek AI Review
        id: review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -x  # Debug output

          # Determine what to diff
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="origin/${{ github.base_ref }}"
            HEAD="origin/${{ github.head_ref }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE="HEAD~1"
            fi
          fi

          echo "Diffing $BASE..$HEAD"
          git diff "$BASE".."$HEAD" > /tmp/pr_diff.txt 2>&1 || git diff HEAD~1 HEAD > /tmp/pr_diff.txt 2>&1

          if [ ! -s /tmp/pr_diff.txt ]; then
            echo "No diff found, skipping"
            exit 0
          fi

          LINE_COUNT=$(wc -l < /tmp/pr_diff.txt)
          if [ "$LINE_COUNT" -gt 8000 ]; then
            head -8000 /tmp/pr_diff.txt > /tmp/pr_diff_trunc.txt
            mv /tmp/pr_diff_trunc.txt /tmp/pr_diff.txt
          fi

          echo "Diff size: $LINE_COUNT lines"

          cp /tmp/pr_diff.txt pr_diff.txt
          python3 .github/scripts/deepseek-review.py 2>&1

      - name: Post review comment
        if: success() && hashFiles('review_output.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Build the comment body from a file and pass it via --body-file so the
          # review markdown (which contains backticks, $, etc.) is never shell-
          # interpolated. Reading into a shell variable and using --body "$COMMENT"
          # triggers command substitution on backticks and breaks the step.
          {
            printf '## 🤖 AI Code Review\n\n'
            cat review_output.md
            printf '\n---\n*Powered by DeepSeek API*\n'
          } > /tmp/comment_body.md

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment_body.md
            echo "Review posted as PR comment"
          else
            # On push events, posting a commit comment requires `contents: write`
            # (not granted here, to keep least privilege). A push to a PR branch
            # also triggers the pull_request event above, which posts the PR
            # comment — so skipping here avoids both a permission failure and a
            # duplicate comment. The review is still generated above and visible
            # in the job log.
            echo "Push event — review generated, skipping commit comment post."
          fi

      - name: Unblock merge if review is clean
        if: steps.review.outcome == 'success' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if grep -q "AUTOFIX:CLEAN" review_output.md; then
            echo "AI review is clean — auto-approving PR #$PR"
            gh pr review "$PR" --approve --body \
              "## ✅ AI Code Review Passed

          The DeepSeek AI review found **no issues**. Merge is now allowed.

          ---
          🤖 *Automated AI code review — approved*"
          else
            echo "AI review found issues — keeping merge blocked"
            SUMMARY=$(head -5 review_output.md | tr '\n' ' ')
            gh pr review "$PR" --request-changes --body \
              "## ⚠️ AI Code Review Found Issues

          The DeepSeek AI review identified potential problems that should be addressed before merging.

          See the [full review comment](${{ github.server_url }}/${{ github.repository }}/pull/$PR#issuecomment-new) for details.

          ---
          🤖 *Automated AI code review — changes requested*"
          fi

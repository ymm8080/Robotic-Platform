name: Auto-Fix Loop

on:
  pull_request:
    branches: ['**']
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to auto-fix'
        required: true
        type: string

jobs:
  auto-fix-lint:
    name: Auto-Fix Lint Errors
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Resolve PR info
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "Resolved PR #$PR_NUMBER on branch $PR_BRANCH"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Switch to PR branch (fix detached HEAD)
        run: |
          PR_BRANCH="${{ steps.pr-info.outputs.pr_branch }}"
          echo "Switching to PR branch: $PR_BRANCH"
          git checkout -B "$PR_BRANCH" "origin/$PR_BRANCH"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Setup git
        run: |
          git config user.name "CatPaw Auto-Fix"
          git config user.email "auto-fix@catpaw.local"

      - name: Run ruff format (sap-bridge only)
        run: |
          echo "=== Running ruff format (sap-bridge) ==="
          ruff format sap-bridge/ || true

      - name: Run ruff check --fix (sap-bridge)
        run: |
          echo "=== Running ruff check --fix (sap-bridge) ==="
          cd sap-bridge
          ruff check . --config ruff.toml --fix --unsafe-fixes || true
          cd ..

      - name: Run ruff check --fix (scripts only)
        run: |
          echo "=== Running ruff check --fix (scripts) ==="
          ruff check scripts/ --fix --unsafe-fixes || true

      - name: Check for changes and commit
        id: check-changes
        env:
          BRANCH: ${{ steps.pr-info.outputs.pr_branch }}
        run: |
          if ! git diff --quiet; then
            echo "Changes detected, committing..."
            git add -A
            git commit -m "fix: auto-fix lint errors [ci skip]"
            git push origin "$BRANCH"
            echo "pushed=true" >> $GITHUB_OUTPUT
          else
            echo "No lint fixes needed."
            echo "pushed=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR (if changes pushed)
        if: steps.check-changes.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          PR_NUMBER=${{ steps.pr-info.outputs.pr_number }}
          gh pr comment $PR_NUMBER --body "Auto-fix: applied ruff format + lint fixes"

  auto-fix-full:
    name: Full Auto-Fix (requires self-hosted runner)
    runs-on: ubuntu-latest
    if: false
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup environment
        run: |
          git config user.name "CatPaw Auto-Fix"
          git config user.email "auto-fix@catpaw.local"

      - name: Wait for AI review + CI to complete
        run: |
          echo "Waiting 60s for DeepSeek review + CI checks to start..."
          sleep 60

      - name: Run auto-fix loop (CatPaw CLI required)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "=== Auto-Fix triggered for PR #${PR_NUMBER} ==="

          if command -v claude &>/dev/null; then
            cat auto-fix.sh | claude --pr "${PR_NUMBER}"
          else
            echo "CatPaw CLI not available. Skipping full auto-fix."
            echo "To enable: install CatPaw CLI on a self-hosted runner."
            exit 0
          fi

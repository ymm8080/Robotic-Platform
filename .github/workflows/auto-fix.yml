name: Auto-Fix Loop

on:
  pull_request:
    branches: ['**']
    types: [opened, synchronize]

jobs:
  auto-fix-lint:
    name: Auto-Fix Lint Errors
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Setup git
        run: |
          git config user.name "CatPaw Auto-Fix"
          git config user.email "auto-fix@catpaw.local"

      - name: Run ruff format (fix line length, imports, etc.)
        run: |
          echo "=== Running ruff format ==="
          ruff format . --check || {
            echo "Formatting needed, applying..."
            ruff format .
          }

      - name: Run ruff check --fix (sap-bridge)
        run: |
          echo "=== Running ruff check --fix (sap-bridge) ==="
          cd sap-bridge
          ruff check . --config ruff.toml --fix --unsafe-fixes || true
          cd ..

      - name: Run ruff check --fix (root scripts)
        run: |
          echo "=== Running ruff check --fix (root) ==="
          ruff check . --fix --unsafe-fixes || true

      - name: Check for changes and commit
        id: check-changes
        run: |
          if ! git diff --quiet; then
            echo "Changes detected, committing..."
            git add -A
            git commit -m "fix: auto-fix lint errors [ci skip]

            - ruff format (line length, import sorting)
            - ruff check --fix (unsafe-fixes enabled)

            [ci skip]"
            git push
            echo "pushed=true" >> $GITHUB_OUTPUT
          else
            echo "No lint fixes needed."
            echo "pushed=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR (if changes pushed)
        if: steps.check-changes.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          gh pr comment $PR_NUMBER --body "## 🤖 Auto-Fix Applied

          Automatically fixed lint errors:
          - \`ruff format\` (line length, import sorting)
          - \`ruff check --fix --unsafe-fixes\` (structural issues)

          Please review the changes and re-push if needed."

  auto-fix-full:
    name: Full Auto-Fix (requires self-hosted runner)
    runs-on: ubuntu-latest
    if: false  # Disabled by default. Enable on self-hosted runner with CatPaw CLI.
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup environment
        run: |
          git config user.name "CatPaw Auto-Fix"
          git config user.email "auto-fix@catpaw.local"

      - name: Wait for AI review + CI to complete
        run: |
          echo "Waiting 60s for DeepSeek review + CI checks to start..."
          sleep 60

      - name: Run auto-fix loop (CatPaw CLI required)
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "=== Auto-Fix triggered for PR #${PR_NUMBER} ==="

          if command -v claude &>/dev/null; then
            cat auto-fix.sh | claude --pr "${PR_NUMBER}"
          else
            echo "CatPaw CLI not available. Skipping full auto-fix."
            echo "To enable: install CatPaw CLI on a self-hosted runner."
            exit 0
          fi

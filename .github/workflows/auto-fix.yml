name: Auto-Fix Loop

on:
  pull_request:
    branches: ['**']
    types: [opened, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to auto-fix'
        required: true
        type: string

# NOTE on GH_PAT: pushes made with the default `github.token` do NOT re-trigger
# workflow runs, which breaks the auto-fix loop's "push -> CI/AI-review re-run"
# contract. Set a `GH_PAT` secret (a PAT with repo + workflow scope) so pushed
# fixes fire ci.yml / v5-core-ci.yml / deepseek-pr-review.yml again.

jobs:
  auto-fix-lint:
    name: Auto-Fix Lint Errors
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}
          # submodules: false — sap-ewm-mcp-servers is a broken gitlink
          # (mode 160000, no .gitmodules entry). Checkout fails without this.
          submodules: false

      - name: Resolve PR info
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          PR_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq '.headRefName')
          PR_BASE=$(gh pr view "$PR_NUMBER" --json baseRefName --jq '.baseRefName')
          echo "pr_branch=$PR_BRANCH" >> $GITHUB_OUTPUT
          echo "pr_base=$PR_BASE" >> $GITHUB_OUTPUT
          echo "Resolved PR #$PR_NUMBER: $PR_BRANCH -> $PR_BASE"

      - name: Switch to PR branch (fix detached HEAD)
        run: |
          PR_BRANCH="${{ steps.pr-info.outputs.pr_branch }}"
          echo "Switching to PR branch: $PR_BRANCH"
          git checkout -B "$PR_BRANCH" "origin/$PR_BRANCH"

      - name: Check if already auto-fixed (prevent loop)
        id: check-skip
        run: |
          LAST_COMMIT=$(git log -1 --pretty=format:"%s")
          if [[ "$LAST_COMMIT" == "fix: auto-fix lint errors"* ]]; then
            echo "Last commit is already an auto-fix commit. Skipping to prevent loop."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.check-skip.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        if: steps.check-skip.outputs.skip != 'true'
        run: pip install ruff

      - name: Setup git
        if: steps.check-skip.outputs.skip != 'true'
        run: |
          git config user.name "CatPaw Auto-Fix"
          git config user.email "auto-fix@catpaw.local"

      # FIX: previously ruff ran only on sap-bridge/ and scripts/, so PRs that
      # touched core/ (e.g. #76-#80) were never linted and "No lint fixes
      # needed." was always printed. Now lint the WHOLE repo (not a specific
      # subset of files) so every PR gets a full ruff pass. ruff auto-discovers
      # config per file: root pyproject.toml [tool.ruff] for core/*,
      # sap-bridge/ruff.toml for sap-bridge/*. ruff respects .gitignore and
      # excludes node_modules / __pycache__ / .git by default.
      - name: Run ruff format (whole repo)
        if: steps.check-skip.outputs.skip != 'true'
        run: |
          echo "=== ruff format (whole repo) ==="
          if ! ruff format . 2>&1; then
            echo "::warning::ruff format encountered errors (non-zero exit). Continuing — lint failures should not block CI."
          fi

      - name: Run ruff check --fix (whole repo)
        if: steps.check-skip.outputs.skip != 'true'
        run: |
          echo "=== ruff check --fix (whole repo) ==="
          if ! ruff check --fix --unsafe-fixes . 2>&1; then
            echo "::warning::ruff check encountered errors (non-zero exit). Continuing — lint failures should not block CI."
          fi

      - name: Check for changes and commit
        id: check-changes
        if: steps.check-skip.outputs.skip != 'true'
        env:
          BRANCH: ${{ steps.pr-info.outputs.pr_branch }}
        run: |
          if ! git diff --quiet; then
            echo "Changes detected, committing..."
            git add -A
            git commit -m "fix: auto-fix lint errors"
            git push origin "$BRANCH"
            echo "pushed=true" >> $GITHUB_OUTPUT
          else
            echo "No lint fixes needed."
            echo "pushed=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR (if changes pushed)
        if: steps.check-skip.outputs.skip != 'true' && steps.check-changes.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          PR_NUMBER=${{ steps.pr-info.outputs.pr_number }}
          gh pr comment $PR_NUMBER --body "Auto-fix: applied ruff format + lint fixes"

  auto-fix-full:
    name: Full CatPaw Auto-Fix (self-hosted)
    # Runs the AI fix loop (auto-fix.sh) that addresses AI-review + CI findings.
    # GATED behind vars.CATPAW_SELF_HOSTED so PRs don't hang on a missing runner.
    #
    # To activate:
    #   1. Register a self-hosted runner with label `catpaw` on this repo.
    #   2. Install + authenticate the Claude/CatPaw CLI on that runner.
    #   3. Set GH_PAT secret (see note at top of file).
    #   4. Create repo variable CATPAW_SELF_HOSTED=true
    #      (gh variable set CATPAW_SELF_HOSTED -b true).
    #   5. Only add this check to required branch protection AFTER the runner is
    #      stable — otherwise PRs queue forever waiting for a matching runner.
    if: ${{ vars.CATPAW_SELF_HOSTED == 'true' }}
    runs-on: [self-hosted, catpaw]
    timeout-minutes: 45
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}
          # submodules: false — sap-ewm-mcp-servers is a broken gitlink
          # (mode 160000, no .gitmodules entry). Checkout fails without this.
          submodules: false

      - name: Resolve PR number
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="${{ inputs.pr_number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          echo "PR #${PR_NUMBER}"

      - name: Setup git
        run: |
          git config user.name "CatPaw Auto-Fix"
          git config user.email "auto-fix@catpaw.local"

      - name: Skip if last commit is an auto-fix commit (loop guard)
        id: check-skip
        run: |
          LAST_COMMIT=$(git log -1 --pretty=format:"%s")
          # Match both lint auto-fix and CatPaw full auto-fix commit prefixes
          if [[ "$LAST_COMMIT" == "fix: auto-fix lint errors"* ]] || [[ "$LAST_COMMIT" == "fix: catpaw auto-fix"* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Wait for AI review + CI to start
        if: steps.check-skip.outputs.skip != 'true'
        run: |
          echo "Waiting 60s for DeepSeek review + CI checks to start..."
          sleep 60

      - name: Verify CatPaw CLI is available
        if: steps.check-skip.outputs.skip != 'true'
        run: |
          if ! command -v claude &>/dev/null; then
            echo "::error::claude CLI not found on the catpaw runner. Install + authenticate the CatPaw CLI on a self-hosted runner labeled 'catpaw'."
            exit 1
          fi
          echo "CatPaw CLI: $(command -v claude)"

      - name: Run CatPaw auto-fix loop
        if: steps.check-skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          PR_NUMBER="${{ steps.pr-info.outputs.pr_number }}"
          echo "=== CatPaw Auto-Fix loop for PR #${PR_NUMBER} ==="
          # auto-fix.sh <PR> prints the fix-loop instructions; pipe them to the
          # claude agent which executes them (fix -> verify -> commit -> push).
          bash auto-fix.sh "$PR_NUMBER" | claude

name: Auto-Fix Loop

on:
  pull_request:
    branches: ['**']
    types: [opened, synchronize]

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Setup environment
        run: |
          git config user.name "CatPaw Auto-Fix"
          git config user.email "auto-fix@catpaw.local"

      - name: Wait for AI review + CI to complete
        run: |
          echo "Waiting 60s for DeepSeek review + CI checks to start..."
          sleep 60

      - name: Run auto-fix loop
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          echo "=== Auto-Fix triggered for PR #${PR_NUMBER} ==="

          # Install CatPaw CLI (if available) or use script directly
          if command -v claude &>/dev/null; then
            cat auto-fix.sh | claude --pr "${PR_NUMBER}"
          else
            echo "CatPaw CLI not available on runner."
            echo "Auto-fix.sh is designed for LOCAL execution:"
            echo "  bash auto-fix.sh ${PR_NUMBER}"
            echo "Workflow will exit. Run auto-fix locally."
            exit 0
          fi

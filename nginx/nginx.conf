# SAP-EWM 机器人调度平台 - Nginx 急救页配置 v3.4
# 职责：独立静态急救页容器，Node-RED 崩溃时仍可用
# 部署：docker compose up nginx-rescue

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式（含真实 IP 穿透）
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # 性能优化
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # 压缩静态资源
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # 上游 Node-RED（用于急救页 JS 轮询，带健康检查）
    # 频率限制（防暴力刷急救页）— 必须放在 http 层，不能在 server 层
    limit_req_zone $binary_remote_addr zone=rescue:10m rate=10r/s;

    upstream nodered_backend {
        server nodered:1880 max_fails=3 fail_timeout=30s;
        # 如果 Node-RED 不可用，Nginx 返回 502，前端 JS 捕获后显示离线
    }

    server {
        listen 80;
        server_name localhost;
        root /usr/share/nginx/html;
        index index.html;

        # 1. 急救页主入口（纯静态 HTML，不依赖 Node-RED）
        location / {
            limit_req zone=rescue burst=20 nodelay;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # 2. Service Worker — must not be cached
        location = /sw.js {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Service-Worker-Allowed "/";
            add_header Content-Type "application/javascript";
        }

        # 3. Manifest
        location = /manifest.json {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Content-Type "application/manifest+json";
        }

        # 4. 静态资源（CSS/JS/图片 — 不允许缓存，确保最新）
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # 3. 反向代理 Node-RED API（供急救页 JS 轮询状态）
        # 如果 Node-RED 崩溃，此处返回 502，前端自动切换离线态
        location /api/ {
            proxy_pass http://nodered_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 短超时，快速失败（让前端感知离线）
            proxy_connect_timeout 3s;
            proxy_send_timeout 3s;
            proxy_read_timeout 3s;

            # 错误处理：Node-RED 不可用时返回 JSON，前端可解析
            proxy_intercept_errors on;
            error_page 502 503 504 = @nodered_offline;
        }

        # Node-RED 离线时的 fallback 响应
        location @nodered_offline {
            add_header Content-Type application/json;
            return 200 '{"safe_mode":true,"throttle_mode":false,"nodered_online":false,"last_alert":"Node-RED 主服务离线"}';
        }

        # 4. 安全：禁止访问隐藏文件和敏感路径
        location ~ /\. {
            deny all;
            return 404;
        }
        location ~* \.(git|svn|htaccess|env|ini|log)$ {
            deny all;
            return 404;
        }

        # 5. 限制请求体大小（防恶意上传）
        client_max_body_size 1m;

    }
}

# =============================================================================
# Prometheus Alert Rules — V5 Traffic Coordinator v5.x
# =============================================================================
groups:
  - name: v5_traffic_coordinator
    interval: 30s
    rules:

      # ══════════════════════════════════════════════════════════════════════
      # P0 — Critical (30s for)
      # ══════════════════════════════════════════════════════════════════════

      - alert: V5CoordinatorDown
        expr: traffic_coordinator_up == 0
        for: 30s
        labels:
          severity: critical
          component: traffic-coordinator
        annotations:
          summary: "V5 Traffic Coordinator is down"
          description: "Traffic Coordinator has been unreachable for >30s — robot dispatch will halt"
          runbook_url: ""

      - alert: V5DeadlockActive
        expr: traffic_coordinator_deadlocks > 0
        for: 30s
        labels:
          severity: critical
          component: traffic-coordinator
        annotations:
          summary: "Active deadlock detected"
          description: "Traffic Coordinator reports {{ $value }} unresolved deadlock(s) for >30s — manual intervention required"
          runbook_url: ""

      - alert: V5ZoneEmergencyLockdown
        expr: traffic_coordinator_emergency_lockdown == 1
        for: 30s
        labels:
          severity: critical
          component: traffic-coordinator
        annotations:
          summary: "Zone emergency lockdown active"
          description: "A zone is in emergency lockdown — all traffic in that zone is stopped"
          runbook_url: ""

      # ══════════════════════════════════════════════════════════════════════
      # P1 — Warning (60s for)
      # ══════════════════════════════════════════════════════════════════════

      - alert: V5IntersectionQueueHigh
        expr: traffic_coordinator_intersection_queue > 5
        for: 60s
        labels:
          severity: warning
          component: traffic-coordinator
        annotations:
          summary: "Intersection queue high"
          description: "Intersection {{ $labels.intersection }} has {{ $value }} robots waiting for >60s — risk of congestion"
          runbook_url: ""

      - alert: V5RobotDegraded
        expr: traffic_coordinator_robot_mode{mode="DEGRADED"} > 0
        for: 60s
        labels:
          severity: warning
          component: traffic-coordinator
        annotations:
          summary: "Robot in degraded mode"
          description: "{{ $value }} robot(s) operating in DEGRADED state for >60s — reduced capability"
          runbook_url: ""

      - alert: V5ChargerAllOccupied
        expr: traffic_coordinator_charger_available == 0
        for: 60s
        labels:
          severity: warning
          component: traffic-coordinator
        annotations:
          summary: "All chargers occupied"
          description: "No charger bays available for >60s — robots may run out of battery"
          runbook_url: ""

      # ══════════════════════════════════════════════════════════════════════
      # P2 — Info (300s for)
      # ══════════════════════════════════════════════════════════════════════

      - alert: V5WormDiskWarning
        expr: traffic_coordinator_worm_disk_free_pct < 20
        for: 300s
        labels:
          severity: info
          component: traffic-coordinator
        annotations:
          summary: "WORM disk free space low"
          description: "WORM blackbox disk has {{ $value }}% free space — below 20% threshold for >5m"
          runbook_url: ""

      - alert: V5SimulatorOffline
        expr: traffic_coordinator_simulator_online == 0
        for: 300s
        labels:
          severity: info
          component: traffic-coordinator
        annotations:
          summary: "Simulator offline"
          description: "Traffic Coordinator simulator endpoint has been offline for >5m"
          runbook_url: ""

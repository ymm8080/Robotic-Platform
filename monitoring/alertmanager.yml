# =============================================================================
# Alertmanager Configuration
# Routes alerts from Prometheus to Feishu/WeCom (via Watchdog webhook)
# =============================================================================
route:
  receiver: "watchdog-webhook"
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      repeat_interval: 30m

receivers:
  - name: "watchdog-webhook"
    webhook_configs:
      - url: "http://watchdog:9090/api/v1/alert/prometheus"
        send_resolved: true

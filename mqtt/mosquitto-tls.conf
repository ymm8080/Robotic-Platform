# MQTT Broker TLS Configuration — Production
# Replace mosquitto.conf with this file for TLS-enabled MQTT
# 1. Generate certs: scripts/generate-mqtt-certs.sh
# 2. Replace mosquitto.conf with this file
# 3. docker compose restart mqtt

listener 1883 localhost
protocol mqtt

# TLS listener (external)
listener 8883
protocol mqtt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
cafile /mosquitto/certs/ca.crt
require_certificate false  # Set true for mutual TLS

# WebSocket TLS
listener 9001
protocol websockets

# Authentication
allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# TLS options
tls_version tlsv1.3
ciphers_tls1.3 TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type information
connection_messages true

# Limits
max_connections 1000
max_inflight_messages 20
max_queued_messages 1000
max_keepalive 65535

# Security
allow_zero_length_clientid false
auto_id_prefix auto-
